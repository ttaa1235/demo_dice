services:
  - type: web
    name: demo-dice-bot
    runtime: python
    plan: free
    region: oregon
    rootDir: .
    buildCommand: pip install -r apps/bot/requirements.txt
    startCommand: cd apps/bot && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NOWPAYMENTS_API_KEY
        sync: false
      - key: NOWPAYMENTS_IPN_SECRET
        sync: false
      - key: CRM_BASE_URL
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
